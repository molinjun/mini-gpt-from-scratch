<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini-GPT Phase 2 Pilot Slides</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #030a16;
      --panel: #07182e;
      --line: #235d84;
      --text: #f5f9ff;
      --muted: #9cb7cf;
      --accent: #55d7ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #0a2443 0, var(--bg) 46%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    .stage {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      padding: 18px;
      gap: 14px;
    }

    header,
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .viewer {
      display: grid;
      place-items: center;
      min-height: 0;
    }

    .slide {
      display: none;
      width: min(100%, 1280px);
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(85, 215, 255, 0.28);
      background: #07182e;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
      overflow: hidden;
    }

    .slide.active {
      display: block;
    }

    .slide img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button {
      min-width: 96px;
      border: 1px solid rgba(85, 215, 255, 0.42);
      border-radius: 8px;
      background: rgba(7, 24, 46, 0.86);
      color: var(--text);
      padding: 9px 12px;
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    @media (max-width: 760px) {
      header,
      footer {
        align-items: flex-start;
        flex-direction: column;
      }

      .controls {
        width: 100%;
      }

      button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <header>
      <h1>Mini-GPT Phase 2 Pilot Slides</h1>
      <div class="meta" id="status">1 / 6</div>
    </header>

    <section class="viewer" aria-label="Pilot slide preview">
      <article class="slide active" data-title="Build a Mini-GPT from Scratch">
        <img src="01-slide-cover.png" alt="Build a Mini-GPT from Scratch">
      </article>
      <article class="slide" data-title="Agenda">
        <img src="02-slide-agenda.png" alt="Agenda">
      </article>
      <article class="slide" data-title="Neural Network Basics">
        <img src="05-slide-neural-network-basics.png" alt="Neural Network Basics">
      </article>
      <article class="slide" data-title="Q, K, V Roles">
        <img src="26-slide-qkv-roles-v2.png" alt="Q, K, V Roles">
      </article>
      <article class="slide" data-title="Training Loop: PyTorch View">
        <img src="34-slide-training-loop-pytorch-v2.png" alt="Training Loop: PyTorch View">
      </article>
      <article class="slide" data-title="Recap: Dennis Through Mini-GPT">
        <img src="39-slide-recap-dennis-v3.png" alt="Recap: Dennis Through Mini-GPT">
      </article>
    </section>

    <footer>
      <div class="meta" id="title">Build a Mini-GPT from Scratch</div>
      <div class="controls">
        <button type="button" data-action="prev">Prev</button>
        <button type="button" data-action="next">Next</button>
      </div>
    </footer>
  </main>

  <script>
    const slides = Array.from(document.querySelectorAll(".slide"));
    const status = document.querySelector("#status");
    const title = document.querySelector("#title");
    let current = 0;

    function show(index) {
      current = Math.max(0, Math.min(slides.length - 1, index));
      slides.forEach((slide, i) => slide.classList.toggle("active", i === current));
      status.textContent = `${current + 1} / ${slides.length}`;
      title.textContent = slides[current].dataset.title;
    }

    document.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      if (button.dataset.action === "prev") show(current - 1);
      if (button.dataset.action === "next") show(current + 1);
    });

    document.addEventListener("keydown", (event) => {
      if (event.metaKey || event.ctrlKey || event.altKey) return;
      if (event.key === "ArrowRight" || event.key === "PageDown" || event.key === " ") {
        event.preventDefault();
        show(current + 1);
      }
      if (event.key === "ArrowLeft" || event.key === "PageUp") {
        event.preventDefault();
        show(current - 1);
      }
      if (event.key === "Home") {
        event.preventDefault();
        show(0);
      }
      if (event.key === "End") {
        event.preventDefault();
        show(slides.length - 1);
      }
    });
  </script>
</body>
</html>
